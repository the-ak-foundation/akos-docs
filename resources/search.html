<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Search</title>
  <link rel="stylesheet" href="tabs.css" type="text/css" />
  <script src="jquery.js"></script>
  <script src="dynsections.js"></script>
  <link rel="stylesheet" href="navtree.css" type="text/css" />
  <script src="resize.js"></script>
  <script src="navtreedata.js"></script>
  <script src="navtree.js"></script>
  <script src="cookie.js"></script>
  <script src="menudata.js"></script>
  <script src="menu.js"></script>
  <link rel="stylesheet" href="doxygen.css" type="text/css" />
  <link rel="stylesheet" href="extra_style.css" type="text/css" />
  <link rel="stylesheet" href="doxygen-awesome.css" type="text/css" />
  <link rel="stylesheet" href="doxygen-awesome-sidebar-only.css" type="text/css" />
  <link rel="stylesheet" href="search/search.css" />
  <style>
    :root {
      --ak-accent: #169451;
      --ak-accent-weak: rgba(22, 148, 81, 0.16);
      --page-bg: #ffffff;
      --page-surface: rgba(255, 255, 255, 0.78);
      --page-text: #1f2937;
      --page-muted: #667085;
      --page-border: #d0d7de;
      --page-shadow: rgba(15, 23, 42, 0.08);
      --page-heading: #1f2937;
    }

    html.dark-mode {
      --page-bg: #1f2327;
      --page-surface: rgba(32, 36, 42, 0.9);
      --page-text: #e5e7eb;
      --page-muted: #9ca3af;
      --page-border: #4b5563;
      --page-shadow: rgba(0, 0, 0, 0.35);
      --page-heading: #f3f4f6;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--page-text);
      background: var(--page-bg);
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 1rem 1rem 2rem;
      color: var(--page-text);
    }

    .page-title {
      margin: 0 0 0.35rem;
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      line-height: 1.05;
      font-weight: 700;
      color: var(--page-heading);
    }

    .page-subtitle {
      margin: 0;
      color: var(--page-muted);
    }

    #MSearchBox {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-start;
      width: 100%;
      background: var(--page-surface);
      border: 1px solid var(--ak-accent);
      border-radius: 999px;
      padding: 0.1rem 0.32rem;
      box-sizing: border-box;
      box-shadow: 0 1px 0 var(--page-shadow);
    }

    #MSearchField {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      font-size: 1rem;
      padding: 0.12rem 0;
      color: var(--page-text) !important;
      caret-color: var(--page-text) !important;
    }

    #MSearchField::placeholder {
      color: var(--page-muted) !important;
      opacity: 1 !important;
    }

    #MSearchBox,
    #MSearchBox * {
      color: var(--page-text);
    }

    #MSearchField::-webkit-search-cancel-button,
    #MSearchField::-webkit-search-decoration {
      -webkit-appearance: none;
      appearance: none;
    }

    #MSearchField::-ms-clear {
      display: none;
      width: 0;
      height: 0;
    }

    #MSearchBox.MSearchBoxActive {
      box-shadow: 0 0 0 3px var(--ak-accent-weak);
    }

    #MSearchResultsWindow {
      position: relative;
      display: block;
      margin-top: 1rem;
      width: 100%;
      height: auto !important;
      min-height: 0;
      max-height: none;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      color: var(--page-text);
    }

    #MSearchResults {
      width: 100%;
      min-height: 0;
      height: auto !important;
    }

    #MSearchSelectWindow {
      display: none !important;
    }

    #MSearchResultsWindow,
    #MSearchResults,
    #MSearchResults iframe {
      position: static !important;
      top: auto !important;
      left: auto !important;
      right: auto !important;
    }

    #MSearchResults iframe {
      width: 100% !important;
      height: 100% !important;
    }

    #MSearchResults a,
    #MSearchResults a:visited {
      color: var(--ak-accent);
    }

    #MSearchResults .SRStatus {
      color: var(--page-muted);
    }

    #MSearchResults .SRPage * {
      color: inherit;
    }

    #nav-tree-contents > ul > li:first-child > div > a {
      opacity: 1 !important;
      pointer-events: auto !important;
    }

    body.search-page > #top > div.sm.sm-dox {
      display: none !important;
    }

    body.search-page #searchBoxPos1,
    body.search-page #searchBoxPos2 {
      display: none !important;
    }

    @media (max-width: 700px) {
      .shell {
        padding: 1rem 0.75rem 2rem;
      }

      #MSearchResultsWindow {
        width: 100%;
      }

    }
  </style>
  <script src="search/searchdata.js"></script>
  <script src="search/search.js"></script>
  <script src="doxygen-awesome-darkmode-toggle.js"></script>
  <script>
    DoxygenAwesomeDarkModeToggle.init()
  </script>
  <script>
    var searchBox;

    window.addEventListener('DOMContentLoaded', function () {
      initMenu('', false, false, 'search.html', 'Search', true);
      searchBox = new SearchBox('searchBox', 'search/', '.html');

      var params = new URLSearchParams(window.location.search);
      var field = document.getElementById('MSearchField');
      var query = params.get('query') || params.get('q') || '';

      field.addEventListener('input', searchBox.OnSearchFieldChange.bind(searchBox));
      field.addEventListener('focus', function () { searchBox.OnSearchFieldFocus(true); });
      field.addEventListener('blur', function () { searchBox.OnSearchFieldFocus(false); });
      field.addEventListener('keydown', function (evt) {
        searchBox.OnSearchFieldChange(evt);
      });

      if (query) {
        field.value = query;
        searchBox.Activate(true);
        searchBox.Search(query);
      } else {
        field.focus();
      }
    });
  </script>
</head>
<body class="search-page">
  <div id="top"><!-- do not remove this div, it is closed by doxygen! -->
    <div id="titlearea">
      <table cellspacing="0" cellpadding="0">
        <tbody>
          <tr style="height: 56px;">
            <td id="projectlogo"><img alt="Logo" src="ak_logo.png" /></td>
            <td id="projectalign" style="padding-left: 0.5em;">
              <div id="projectname">AKOS
                &#160;<span id="projectnumber">v1.0.0</span>
              </div>
              <div id="projectbrief">Documentation</div>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="doc-header-shell">
        <div id="doc-menu-slot"></div>
        <div class="doc-search-row">
          <div id="MSearchBox" class="MSearchBoxInactive">
            <span class="doc-search-icon" aria-hidden="true"></span>
            <input type="text" id="MSearchField" name="query" class="doc-search-input" placeholder="Search docs" aria-label="Search docs" autocomplete="off" />
            <span id="MSearchClose" style="display:none;" aria-hidden="true"></span>
          </div>
          <div id="doc-theme-toggle" class="doc-theme-toggle-slot" aria-label="Toggle light and dark mode"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="main-nav"></div>
  <div id="side-nav" class="ui-resizable side-nav-resizable">
    <div id="nav-tree">
      <div id="nav-tree-contents">
        <div id="nav-sync" class="sync"></div>
      </div>
    </div>
    <div id="splitbar" style="-moz-user-select:none;" class="ui-resizable-handle"></div>
  </div>
  <script>
    $(function(){initNavTree('search.html','',''); });
  </script>
  <div id="container">
    <div id="doc-content">
      <main class="shell">
        <section class="search-page" aria-labelledby="search-title">
          <h1 class="page-title" id="search-title">Search Results</h1>
        </section>

        <div id="MSearchSelectWindow"
             onmouseover="return searchBox.OnSearchSelectShow()"
             onmouseout="return searchBox.OnSearchSelectHide()"
             onkeydown="return searchBox.OnSearchSelectKey(event)"></div>

        <div id="MSearchResultsWindow">
          <div id="MSearchResults">
            <div class="SRPage">
              <div id="SRIndex">
                <div id="SRResults"></div>
                <div class="SRStatus" id="Loading">Loading...</div>
                <div class="SRStatus" id="Searching">Searching...</div>
                <div class="SRStatus" id="NoMatches">No Matches</div>
              </div>
            </div>
          </div>
        </div>
        <input type="text" id="MSearchSelect" style="display:none;" aria-hidden="true" />
      </main>
    </div>
  </div>
  <script>
    (function () {
      function moveMenuIntoHeader() {
        var menu = document.querySelector('.sm.sm-dox');
        var slot = document.getElementById('doc-menu-slot');
        if (menu && slot && menu.parentNode !== slot) {
          slot.appendChild(menu);
        }
      }

      window.addEventListener('DOMContentLoaded', moveMenuIntoHeader);
      window.addEventListener('load', moveMenuIntoHeader);

      var attempts = 0;
      var interval = window.setInterval(function () {
        moveMenuIntoHeader();
        attempts += 1;
        if (attempts > 40) {
          window.clearInterval(interval);
        }
      }, 50);

      var topNode = document.getElementById('top');
      if (topNode && window.MutationObserver) {
        var observer = new MutationObserver(moveMenuIntoHeader);
        observer.observe(topNode, { childList: true, subtree: true });
      }
    })();
    </script>
  <style>
    #MSearchBox .left {
      display: none;
    }

    #MSearchBox .doc-search-icon {
      display: inline-block;
      margin-right: 0;
    }
  </style>
</body>
</html>
