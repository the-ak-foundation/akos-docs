name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Doxygen 1.14.0
        run: |
          curl -L --fail --show-error \
            https://github.com/doxygen/doxygen/releases/download/Release_1_14_0/doxygen-1.14.0.linux.bin.tar.gz \
            -o /tmp/doxygen-1.14.0.linux.bin.tar.gz
          tar -xzf /tmp/doxygen-1.14.0.linux.bin.tar.gz -C /tmp
          sudo cp /tmp/doxygen-1.14.0/bin/doxygen /usr/local/bin/doxygen

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz make perl python3 texlive-latex-base texlive-latex-extra

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Doxygen version
        run: doxygen --version

      - name: Build docs
        run: ./build_docs.sh

      - name: Build PDF for site download
        run: |
          ./build_docs.sh --pdf
          cp out/latex/refman.pdf out/html/akos.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
